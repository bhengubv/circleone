# Rime dictionary for isiBheqe soHlamvu -- the CircleOne keyboard
#
# FORMAT: [character] TAB [input sequence] TAB [weight]
#
# INPUT ORDER: Vowel FIRST, then consonant(s).
#   e.g. "ab" means vowel /a/ + consonant /b/ => the syllable "ba"
#
# NOTE ON PUA CODEPOINTS:
#   isiBheqe soHlamvu characters are not yet encoded in Unicode.
#   The final implementation will use Private Use Area (PUA) codepoints
#   in the range U+F0000--U+F00FF (Supplementary PUA-A) or a range
#   assigned after formal Unicode acceptance.
#
#   In this file, placeholder symbols from existing Unicode blocks are
#   used for development and testing. Each entry includes a comment
#   noting the intended PUA assignment. Replace these placeholders
#   with actual PUA codepoints once the font and codepoint mapping
#   are finalised.


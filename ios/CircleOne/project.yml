name: CircleOne
options:
  bundleIdPrefix: za.co.thegeek
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "" # Set your Apple Team ID here

targets:
  CircleOneApp:
    type: application
    platform: iOS
    sources:
      - path: CircleOneApp
    resources:
      - path: ../font/one.ttf
    info:
      path: CircleOneApp/Info.plist
      properties:
        UIAppFonts:
          - one.ttf
        CFBundleDisplayName: CircleOne
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: za.co.thegeek.circleone
        INFOPLIST_FILE: CircleOneApp/Info.plist
    dependencies:
      - target: CircleOneKeyboard

  CircleOneKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: CircleOneKeyboard
    resources:
      - path: ../font/one.ttf
      - path: ../font/one-pua-map.csv
    info:
      path: CircleOneKeyboard/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: za.co.thegeek.circleone.keyboard
        INFOPLIST_FILE: CircleOneKeyboard/Info.plist
    entitlements:
      path: CircleOneKeyboard/CircleOneKeyboard.entitlements

schemes:
  CircleOne:
    build:
      targets:
        CircleOneApp: all
        CircleOneKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
